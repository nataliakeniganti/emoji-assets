name: Build And Release Noto Android Assets

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-noto-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin pngquant zip

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="latest"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=JoyPixels Noto Android ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=noto-android-latest" >> "$GITHUB_OUTPUT"
            echo "release_name=JoyPixels Noto Android Latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Noto Android release bundle
        run: ./helpers/export-noto-android-release.sh build/noto-android "${{ steps.version.outputs.value }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmoji-noto-android-${{ steps.version.outputs.value }}
          path: |
            build/noto-android/release/*.zip
            build/noto-android/font/JoyPixels-color-cbdt.ttf

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.release_name }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.make_latest }}
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          files: |
            build/noto-android/release/*.zip
            build/noto-android/font/JoyPixels-color-cbdt.ttf
